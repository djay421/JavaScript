<!DOCTYPE html>
<html>
<head>
    <title>Dobbel Spel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Dobbel Spel</h1>
        
        <div class="score">
            <div class="score-item">
                <h3>Winsten</h3>
                <p id="wins">0</p>
            </div>
            <div class="score-item">
                <h3>Verliezen</h3>
                <p id="losses">0</p>
            </div>
            <div class="score-item">
                <h3>Gelijkspel</h3>
                <p id="draws">0</p>
            </div>
        </div>

        <div class="game">
            <div class="player">
                <h2>Jij</h2>
                <div class="dice-container">
                    <div class="dice" id="player1">1</div>
                    <div class="dice" id="player2">1</div>
                </div>
                <p class="total">Totaal: <span id="playerTotal">2</span></p>
            </div>

            <button id="playBtn" onclick="playGame()">gooi</button>

            <div class="player">
                <h2>Computer</h2>
                <div class="dice-container">
                    <div class="dice" id="computer1">1</div>
                    <div class="dice" id="computer2">1</div>
                </div>
                <p class="total">Totaal: <span id="computerTotal">2</span></p>
            </div>
        </div>

        <p id="result"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
